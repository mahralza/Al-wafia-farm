<style>

  .back {

  .item:hover {

  }

  .item img {
    width: 100%;
    height: auto;
    display: block;
  }

  .desc {

    text-align: center;

  .order-btn {

    border: none;

    padding: 10px;
    font-weight: 700;
    font-size: 14px;
