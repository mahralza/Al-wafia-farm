<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>صيصان – Al Wafia Farm</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: "Tajawal", Arial, sans-serif;
    background: #e3edf6;
    color: #1f2a37;
    direction: rtl;
    text-align: right;
    padding: 20px 14px;
  }

  .back {
    display: inline-block;
    background: #4caf50;
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 700;
    margin-bottom: 24px;
  }

  h1 {
    text-align: center;
    color: #00695c;
    margin: 0 0 16px;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .item {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    transition: transform 0.2s ease;
  }

  .item:hover {
    transform: translateY(-6px);
  }

  .item img {
    width: 100%;
    height: auto;
    display: block;
  }

  .desc {
    padding: 16px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
  }
</style>
</head>
<body>

<a href="index.html" class="back">← الرئيسية</a>

<h1>صيصان</h1>

<div class="gallery">

  <!-- sh1 – امروك -->
  <div class="item">
    <img src="sh1.jpeg" alt="صيصان امروك الاماني حجم جابو">
    <div class="desc">صيصان امروك الاماني حجم جابو – 50 درهم – العمر: شهر</div>
  </div>

  <!-- sh2 – فيوم كلاسك -->
  <div class="item">
    <img src="sh2.jpeg" alt="صيصان فيوم كلاسك">
    <div class="desc">صيصان فيوم كلاسك – 10 درهم – العمر: شهر</div>
  </div>

  <!-- sh3 – رومي (new) -->
  <div class="item">
    <img src="sh3.jpeg" alt="صيصان رومي">
    <div class="desc">صيصان رومي – 15 درهم – العمر: أسبوعين</div>
  </div>

</div>

</body>
</html>
