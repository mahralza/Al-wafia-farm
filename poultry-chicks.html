<style>
  body {
    margin: 0;
    font-family: "Tajawal", Arial, sans-serif;
    background: #e3edf6;
    color: #1f2a37;
    direction: rtl;
    text-align: right;
    padding: 20px 14px;
  }

  .back {
    display: inline-block;
    background: #4caf50;
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 700;
    margin-bottom: 24px;
  }

  h1 {
    text-align: center;
    color: #00695c;
    margin: 0 0 16px;
  }

  .info {
    text-align: center;
    margin-bottom: 32px;
    font-size: 17px;
    color: #444;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .item {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    transition: transform 0.2s ease;
  }

  .item:hover {
    transform: translateY(-6px);
  }

  .item img {
    width: 100%;
    height: auto;
    display: block;
  }

  .desc {
    padding: 16px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
  }
</style>
</head>
